<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Stratégie Pro</title>
    <style>
        :root { --danger: #e11d48; --success: #10b981; --bg: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #334155; }
        h2 { font-size: 16px; color: var(--success); margin-top: 0; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--danger); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .result { margin-top: 15px; padding: 15px; background: rgba(16, 185, 129, 0.1); border-radius: 8px; border-left: 4px solid var(--success); display: none; }
        .warning { color: #94a3b8; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center; color: var(--danger);">✈️ AVIATOR PREDICTOR</h1>

    <div class="card">
        <h2>📊 Stratégie Tours (Bleu x4)</h2>
        <p class="warning">Isao ny Bleu (1.50 - 1.99) ao anaty 4-8 bleu successifs.</p>
        <input type="number" id="nbBleu" placeholder="Isan'ny bleu (1.50+)">
        <button onclick="calcTours()">Calculer le Tour</button>
        <div id="resTours" class="result"></div>
    </div>

    <div class="card">
        <h2>📉 Analyse Décroissante</h2>
        <p class="warning">Mampidira cote roa (ex: 3.50 sy 1.86)</p>
        <input type="number" step="0.01" id="cote1" placeholder="Cote 1">
        <input type="number" step="0.01" id="cote2" placeholder="Cote 2">
        <button onclick="calcDecroiss()">Vérifier Condition</button>
        <div id="resDecroiss" class="result"></div>
    </div>

    <div class="card">
        <h2>🕒 Prédiction par Lera</h2>
        <input type="text" id="time1" placeholder="Lera 1 (ex: 11:20:30)">
        <input type="text" id="time2" placeholder="Lera 2 (ex: 11:30:30)">
        <button onclick="calcTime()">Calculer Prochain Boom</button>
        <div id="resTime" class="result"></div>
    </div>
</div>

<script>
    // 1. Logic Bleu x4
    function calcTours() {
        const nb = document.getElementById('nbBleu').value;
        if(nb) {
            const result = nb * 4;
            const resDiv = document.getElementById('resTours');
            resDiv.style.display = "block";
            resDiv.innerHTML = `<strong>Valiny: ${result}</strong><br>Manisà tours ${result} manomboka eo amin'ny violet farany. Miomana miditra eo amin'ny faha-${result - 1}! 🚀`;
        }
    }

    // 2. Logic Décroissance
    function calcDecroiss() {
        const c1 = document.getElementById('cote1').value;
        const c2 = document.getElementById('cote2').value;
        if(c1 && c2) {
            const v1 = (c1 % 1).toFixed(2) * 100;
            const v2 = (c2 % 1).toFixed(2) * 100;
            const resDiv = document.getElementById('resDecroiss');
            resDiv.style.display = "block";
            
            if(v1 > 50 && v2 > 50 && c1 > c2) {
                resDiv.innerHTML = "✅ <strong>Fepetra feno!</strong> Ny tour manaraka dia tokony ho VIOLET (x2+) 🚀";
            } else {
                resDiv.innerHTML = "❌ Tsy feno ny fepetra (Décroissant + Virgule > 50).";
            }
        }
    }

    // 3. Logic Time (Simplifié)
    function calcTime() {
        // Eto no asiana an'ilay soustraction lera sy addition minutes
        // Ohatra tsotra:
        const resDiv = document.getElementById('resTime');
        resDiv.style.display = "block";
        resDiv.innerHTML = "Analyse en cours... Miandrasa cote 1.00-1.10 aloha. ⏳";
    }
</script>
</body>
</html>
